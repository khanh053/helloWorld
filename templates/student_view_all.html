{% extends "base.html" %}
{% block page_content %}
    <div class="row">
        <div class="col">
            <table class="table table-striped">
                <tr>
                    <th>Last Name</th><th>First Name</th><th>Email</th><th>Major</th><th>Actions</th>
                </tr>
                {% for each_student, each_major in students %}
                <tr>
                    <td><a href="{{ url_for('student_view', student_id=each_student.student_id) }}">{{ each_student.last_name }}</a></td>
                    <td>{{ each_student.first_name }}</td>
                    <td>{{ each_student.email }}</td>
                    <td>{{ each_major.major }}</td>
                    <td>
                        <a href="{{ url_for('student_edit', student_id=each_student.student_id) }}" class="btn btn-secondary btn-sm">Edit</a>
                    </td>
                </tr>
                {% endfor %}
            </table>
        </div>
    </div>
{% endblock %}
